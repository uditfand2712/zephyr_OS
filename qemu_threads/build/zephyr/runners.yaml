# Available runners configured by board.cmake.
runners:
- qemu

# Default flash runner if --runner is not given.
flash-runner: qemu

# Default debug runner if --runner is not given.
debug-runner: qemu

# Common runner configuration values.
config:
  board_dir: /home/udit/zephyrproject/zephyr/boards/qemu/cortex_m3
  # Build outputs:
  elf_file: zephyr.elf
  # Host tools:
  gdb: /home/udit/zephyr-sdk-1.0.1/gnu/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb-py
  openocd: /home/udit/zephyr-sdk-1.0.1/hosttools/sysroots/x86_64-pokysdk-linux/usr/bin/openocd
  openocd_search:
    - /home/udit/zephyr-sdk-1.0.1/hosttools/sysroots/x86_64-pokysdk-linux/usr/share/openocd/scripts

# Runner specific arguments
args:
  qemu:
    []

